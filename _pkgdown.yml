url: https://github.com/ndpvh/discounting-affect

template:
  bootstrap: 5
  light-switch: true 
  theme: github-light
  theme-dark: github-dark
  includes:
    in_header: |
      <script type="text/javascript" async="" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-MML-AM_CHTML"></script>

authors:
  Niels Vanhasbroeck:
    href: https://ndpvh.github.io

repo:
  url:
    home: https://ndpvh.github.io/discounting-affect
    source: https://github.com/ndpvh/discounting-affect/tree/main/
    issue: https://github.com/ndpvh/discounting-affect/issues/
    branch: main

navbar:
  structure:
    left: [reference, articles]
    right: [search, github, lightswitch]
  components:
    articles:
      text: Usage
      menu:
      - text: Getting Started
        href: articles/getting_started.html
      - text: Discounting Models 
        href: articles/models.html
    github:
      icon: fa-github
      href: https://github.com/ndpvh/discounting-affect/
      aria-label: Github

reference:
- title: Model definition
  contents: has_concept("models")
- title: Data
  contents: has_concept("data")
- title: Simulation
  contents: has_concept("simulation")
- title: Estimation
  contents: has_concept("estimation")
- title: Statistics
  contents: has_concept("statistics")
- title: Utility
  contents: has_concept("utility")
